# fully_associative.conf
# Fully associative cache: assoc = capacity / block_size → numSets = 1.
# All cache lines compete in a single set; replacement policy alone decides eviction.
# No address-based set conflicts are possible.
name          = FA
cache_size    = 4096    # 4 KiB total
block_size    = 64
associativity = 64      # 4096 / 64 = 64 ways, 1 set → fully associative
replacement   = lru
write_policy  = write_back
write_miss    = write_allocate
