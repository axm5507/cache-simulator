# Default L1 cache configuration
# 32 KiB, 64-byte blocks, 4-way set-associative, LRU, write-back

name          = L1
cache_size    = 32K          # 32 KiB total capacity (32768 bytes)
block_size    = 64           # 64-byte lines — standard x86 L1 cache line size
associativity = 4            # 4-way set-associative → 128 sets
replacement   = lru          # Least Recently Used
write_policy  = write_back   # Flush dirty lines to memory only on eviction
write_miss    = write_allocate  # Bring the line into cache on a write miss
