# Direct-mapped cache — 1 way per set, no associativity
# Highest conflict-miss rate but lowest hardware cost and lookup latency

name          = DirectMapped
cache_size    = 64K          # 64 KiB → 1024 sets
block_size    = 64
associativity = 1            # Direct-mapped: each address maps to exactly one slot
replacement   = lru          # Replacement policy is irrelevant with 1 way
write_policy  = write_back
write_miss    = write_allocate
