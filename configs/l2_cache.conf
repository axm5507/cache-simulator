# Typical unified L2 cache configuration
# 256 KiB, 64-byte blocks, 8-way set-associative, LRU, write-back

name          = L2
cache_size    = 256K         # 256 KiB → 512 sets at 8-way associativity
block_size    = 64
associativity = 8
replacement   = lru
write_policy  = write_back
write_miss    = write_allocate
